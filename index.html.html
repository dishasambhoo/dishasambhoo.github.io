<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snakes & Ladders</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Nunito', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 8px;
  }

  @keyframes rollDice {
    0%   { transform: rotateX(0deg)   rotateY(0deg)   rotateZ(0deg); }
    20%  { transform: rotateX(180deg) rotateY(90deg)  rotateZ(45deg); }
    40%  { transform: rotateX(90deg)  rotateY(270deg) rotateZ(180deg); }
    60%  { transform: rotateX(270deg) rotateY(180deg) rotateZ(90deg); }
    80%  { transform: rotateX(180deg) rotateY(360deg) rotateZ(270deg); }
    100% { transform: rotateX(360deg) rotateY(540deg) rotateZ(360deg); }
  }
  @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  @keyframes popIn  { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0deg)} 100%{transform:translateY(110vh) rotate(720deg)} }
  @keyframes glowPulse {
    0%,100%{ box-shadow:0 0 15px rgba(255,220,50,0.5) }
    50%    { box-shadow:0 0 30px rgba(255,220,50,0.9), 0 0 50px rgba(255,180,0,0.4) }
  }

  .rolling { animation: rollDice 0.6s ease-in-out; }
  .pop-in  { animation: popIn 0.4s ease; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    animation: fadeInDown 0.5s ease both;
  }
  #header h1 {
    color: #ffd700; font-size: 22px;
    font-family: 'Fredoka One', cursive;
    text-shadow: 0 2px 10px rgba(255,215,0,0.4);
  }
  #header span { font-size: 28px; }

  /* ── Setup screen ── */
  #setup-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 80vh;
  }
  #setup-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 24px; padding: 40px 48px; text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeInDown 0.6s ease both;
    max-width: 400px;
  }
  #setup-card .icon { font-size: 60px; margin-bottom: 8px; }
  #setup-card h2 {
    color: #ffd700; font-size: 36px; margin-bottom: 8px;
    font-family: 'Fredoka One', cursive;
    text-shadow: 0 2px 10px rgba(255,215,0,0.5);
  }
  #setup-card p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
  #setup-card .how-many { color: rgba(255,255,255,0.8); font-size: 16px; margin-bottom: 20px; }
  #setup-btns { display: flex; gap: 12px; justify-content: center; }
  .setup-btn {
    width: 70px; height: 70px;
    border: none; border-radius: 16px; font-size: 24px;
    cursor: pointer; color: white;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .setup-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.4); }

  /* ── Game layout ── */
  #game-screen { display: none; width: 100%; max-width: 900px; }
  #game-layout {
    display: flex; gap: 16px;
    align-items: flex-start; flex-wrap: wrap; justify-content: center;
  }

  /* ── Board ── */
  #board-wrap {
    border-radius: 12px; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,215,0,0.3);
    position: relative;
  }
  #board-canvas { display: block; }

  /* ── Side panel ── */
  #side-panel {
    display: flex; flex-direction: column; gap: 12px;
    min-width: 200px; max-width: 240px; flex: 1;
  }
  .panel-box {
    background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .panel-label {
    color: rgba(255,255,255,0.5); font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Players */
  .player-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; padding: 6px 10px;
    border-radius: 10px; transition: all 0.3s;
    border: 1px solid transparent;
  }
  .player-token {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 800;
    flex-shrink: 0;
  }
  .player-name { color: white; font-size: 12px; font-weight: 700; }
  .player-pos  { color: rgba(255,255,255,0.5); font-size: 11px; }
  .player-dot  {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; animation: pulse 1s ease infinite;
  }

  /* Dice panel */
  #dice-panel {
    background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
  }
  #dice-panel .panel-label { align-self: flex-start; margin-bottom: 0; }

  #dice {
    width: 72px; height: 72px;
    background: linear-gradient(145deg, #ffffff, #e8e8e8);
    border-radius: 14px;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.3), -1px -1px 4px rgba(255,255,255,0.9),
                inset 0 1px 0 rgba(255,255,255,0.9);
    cursor: pointer; user-select: none;
    border: 1px solid rgba(0,0,0,0.1);
    transition: transform 0.1s;
  }
  #dice svg { width: 100%; height: 100%; padding: 8px; display: block; }
  #dice.disabled { cursor: not-allowed; opacity: 0.7; }

  #roll-btn {
    width: 100%; padding: 10px 0;
    border: none; border-radius: 10px;
    color: white; font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: 'Fredoka One', cursive;
    transition: all 0.2s; letter-spacing: 1px;
  }
  #roll-btn:disabled { cursor: not-allowed; background: rgba(255,255,255,0.1) !important; box-shadow: none !important; }

  #turn-msg {
    font-size: 11px; text-align: center; font-weight: 700;
    min-height: 32px; line-height: 1.4;
  }

  /* Log */
  #log-panel {
    background: rgba(0,0,0,0.3); border-radius: 14px; padding: 12px;
    border: 1px solid rgba(255,255,255,0.07); flex: 1;
  }
  #log-scroll {
    max-height: 160px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .log-entry {
    color: rgba(255,255,255,0.7); font-size: 11px;
    margin-bottom: 5px; line-height: 1.4;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .log-entry:last-child { border-bottom: none; }

  #change-btn {
    padding: 8px 0;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: rgba(255,255,255,0.6);
    font-size: 11px; cursor: pointer;
    font-family: 'Nunito', sans-serif; letter-spacing: 1px;
    transition: all 0.15s; width: 100%;
  }
  #change-btn:hover { background: rgba(255,255,255,0.12); }

  /* Confetti */
  #confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; top: -20px;
    animation: confetti linear forwards;
  }
</style>
</head>
<body>

<!-- Header (always visible during game) -->
<div id="header" style="display:none;">
  <span>🐍</span>
  <h1>Snakes & Ladders</h1>
  <span>🪜</span>
</div>

<!-- Setup Screen -->
<div id="setup-screen">
  <div id="setup-card">
    <div class="icon">🐍🪜</div>
    <h2>Snakes & Ladders</h2>
    <p>Classic board game — roll dice, climb ladders, avoid snakes!</p>
    <div class="how-many">How many players?</div>
    <div id="setup-btns">
      <button class="setup-btn" onclick="startGame(2)" style="background:linear-gradient(145deg,#80d8ff,#3498db)">2P</button>
      <button class="setup-btn" onclick="startGame(3)" style="background:linear-gradient(145deg,#b9f6ca,#2ecc71)">3P</button>
      <button class="setup-btn" onclick="startGame(4)" style="background:linear-gradient(145deg,#ffe57f,#f39c12)">4P</button>
    </div>
  </div>
</div>

<!-- Game Screen -->
<div id="game-screen">
  <div id="game-layout">
    <!-- Board -->
    <div id="board-wrap">
      <canvas id="board-canvas"></canvas>
    </div>

    <!-- Side Panel -->
    <div id="side-panel">
      <!-- Players -->
      <div class="panel-box">
        <div class="panel-label">Players</div>
        <div id="players-list"></div>
      </div>

      <!-- Dice -->
      <div id="dice-panel">
        <div class="panel-label">Dice</div>
        <div id="dice" onclick="rollDice()">
          <svg id="dice-svg" viewBox="0 0 100 100"></svg>
        </div>
        <button id="roll-btn" onclick="rollDice()">🎲 Roll!</button>
        <div id="turn-msg"></div>
      </div>

      <!-- Log -->
      <div id="log-panel">
        <div class="panel-label" style="color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Move Log</div>
        <div id="log-scroll"></div>
      </div>

      <button id="change-btn" onclick="goSetup()">← Change Players</button>
    </div>
  </div>
</div>

<div id="confetti-container"></div>

<script>
// ── Game Data ──────────────────────────────────────────────────────────────
const SNAKES  = {99:78,95:75,92:88,89:68,74:53,64:60,62:19,49:11,46:25,16:6};
const LADDERS = {4:14,9:31,20:38,28:84,40:59,51:67,63:81,71:91};

const PLAYERS = [
  {id:0,name:"Player 1",color:"#e74c3c",light:"#ff8a80",rgb:"231,76,60"},
  {id:1,name:"Player 2",color:"#3498db",light:"#80d8ff",rgb:"52,152,219"},
  {id:2,name:"Player 3",color:"#2ecc71",light:"#b9f6ca",rgb:"46,204,113"},
  {id:3,name:"Player 4",color:"#f39c12",light:"#ffe57f",rgb:"243,156,18"},
];

const DOT_POSITIONS = {
  1:[[50,50]],
  2:[[25,25],[75,75]],
  3:[[25,25],[50,50],[75,75]],
  4:[[25,25],[75,25],[25,75],[75,75]],
  5:[[25,25],[75,25],[50,50],[25,75],[75,75]],
  6:[[25,20],[75,20],[25,50],[75,50],[25,80],[75,80]],
};

const CELL_COLORS = [
  ["#fff9e6","#fef3c7"],["#e6f7ff","#dbeafe"],["#f0fdf4","#dcfce7"],
  ["#fdf4ff","#f3e8ff"],["#fff1f2","#ffe4e6"],["#f0fdfa","#ccfbf1"],
];

const SNAKE_COLORS = ["#e74c3c","#8e44ad","#c0392b","#d35400","#16a085","#27ae60","#2980b9","#8e44ad","#e74c3c","#c0392b"];

// Pre-compute snake midpoints (deterministic)
const SNAKE_MID_OFFSETS = Object.keys(SNAKES).map((_,i) => (i%2===0 ? 30 : -30));

// ── State ──────────────────────────────────────────────────────────────────
let numPlayers = 2;
let positions  = [0,0,0,0];
let currentPlayer = 0;
let diceValue  = 1;
let rolling    = false;
let phase      = "setup"; // setup | playing | won
let moveLog    = [];

const CELL_SIZE = 52;

// ── Coord helper ──────────────────────────────────────────────────────────
function cellToXY(cell) {
  const row = Math.floor((cell-1)/10);
  const col = (cell-1)%10;
  const x   = row%2===0 ? col : 9-col;
  const y   = 9-row;
  return {x,y};
}

// ── Canvas Board ──────────────────────────────────────────────────────────
const canvas = document.getElementById('board-canvas');
const ctx    = canvas.getContext('2d');
const SIZE   = CELL_SIZE * 10;
canvas.width  = SIZE;
canvas.height = SIZE;

function drawBoard() {
  ctx.clearRect(0,0,SIZE,SIZE);

  // Cells
  for (let n=1; n<=100; n++) {
    const {x,y} = cellToXY(n);
    const row = Math.floor((n-1)/10);
    const [c1,c2] = CELL_COLORS[(x+row) % CELL_COLORS.length];
    ctx.fillStyle = (x+row)%2===0 ? c1 : c2;
    ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);

    // Number
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font = `bold ${CELL_SIZE*0.2}px Nunito,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(n, (x+0.5)*CELL_SIZE, y*CELL_SIZE + CELL_SIZE*0.28);
  }

  // Ladders
  Object.entries(LADDERS).forEach(([from, to]) => {
    const f = cellToXY(Number(from));
    const t = cellToXY(Number(to));
    const fx=(f.x+0.5)*CELL_SIZE, fy=(f.y+0.5)*CELL_SIZE;
    const tx=(t.x+0.5)*CELL_SIZE, ty=(t.y+0.5)*CELL_SIZE;
    const dx=tx-fx, dy=ty-fy;
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx=-dy/len*CELL_SIZE*0.12, ny=dx/len*CELL_SIZE*0.12;
    const steps=Math.round(len/(CELL_SIZE*0.55));

    ctx.strokeStyle='#c0892a'; ctx.lineWidth=CELL_SIZE*0.09; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(fx+nx,fy+ny); ctx.lineTo(tx+nx,ty+ny); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx-nx,fy-ny); ctx.lineTo(tx-nx,ty-ny); ctx.stroke();

    ctx.strokeStyle='#e8a840'; ctx.lineWidth=CELL_SIZE*0.07;
    for (let i=0;i<steps;i++) {
      const t2=(i+1)/(steps+1);
      const rx=fx+dx*t2, ry=fy+dy*t2;
      ctx.beginPath(); ctx.moveTo(rx+nx*1.3,ry+ny*1.3); ctx.lineTo(rx-nx*1.3,ry-ny*1.3); ctx.stroke();
    }
  });

  // Snakes
  Object.entries(SNAKES).forEach(([from, to], idx) => {
    const f = cellToXY(Number(from));
    const t = cellToXY(Number(to));
    const fx=(f.x+0.5)*CELL_SIZE, fy=(f.y+0.5)*CELL_SIZE;
    const tx=(t.x+0.5)*CELL_SIZE, ty=(t.y+0.5)*CELL_SIZE;
    const color = SNAKE_COLORS[idx % SNAKE_COLORS.length];
    const offset = SNAKE_MID_OFFSETS[idx];
    const mx=(fx+tx)/2+offset, my=(fy+ty)/2;

    ctx.strokeStyle=color; ctx.lineWidth=CELL_SIZE*0.28; ctx.lineCap='round'; ctx.globalAlpha=0.75;
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.quadraticCurveTo(mx,my,tx,ty); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=CELL_SIZE*0.1; ctx.globalAlpha=1;
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.quadraticCurveTo(mx,my,tx,ty); ctx.stroke();
    ctx.globalAlpha=1;

    // Head
    ctx.fillStyle=color; ctx.strokeStyle='white'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(fx,fy,CELL_SIZE*0.18,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Eyes whites
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(fx-CELL_SIZE*0.06,fy-CELL_SIZE*0.06,CELL_SIZE*0.05,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(fx+CELL_SIZE*0.06,fy-CELL_SIZE*0.06,CELL_SIZE*0.05,0,Math.PI*2); ctx.fill();
    // Pupils
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(fx-CELL_SIZE*0.06,fy-CELL_SIZE*0.06,CELL_SIZE*0.025,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(fx+CELL_SIZE*0.06,fy-CELL_SIZE*0.06,CELL_SIZE*0.025,0,Math.PI*2); ctx.fill();
  });

  // Tokens
  const tokenOffsets = [[-0.18,-0.18],[0.18,-0.18],[-0.18,0.18],[0.18,0.18]];
  for (let p=0; p<numPlayers; p++) {
    const pos = positions[p];
    if (pos===0) continue;
    const {x,y} = cellToXY(pos);
    const [ox,oy] = tokenOffsets[p] || [0,0];
    const cx = (x+0.5+ox)*CELL_SIZE;
    const cy = (y+0.5+oy)*CELL_SIZE;
    const r  = CELL_SIZE*0.16;
    const pl = PLAYERS[p];

    const grad = ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
    grad.addColorStop(0, pl.light);
    grad.addColorStop(1, pl.color);

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();

    ctx.fillStyle='white';
    ctx.font=`bold ${r*0.9}px Nunito,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p+1, cx, cy+1);
    ctx.textBaseline='alphabetic';
  }
}

// ── Animated token move ───────────────────────────────────────────────────
// We animate step-by-step
let animQueue = [];
let animating = false;

function animateMove(playerIdx, steps, callback) {
  let moved = 0;
  const startPos = positions[playerIdx];

  function step() {
    if (moved < steps) {
      moved++;
      let next = positions[playerIdx] + 1;
      if (next > 100) next = 100;
      positions[playerIdx] = next;
      drawBoard();
      moved < steps ? setTimeout(step, 120) : setTimeout(() => {
        // Check snakes/ladders
        let finalPos = positions[playerIdx];
        let extra = null;
        if (SNAKES[finalPos]) { extra = {type:'snake', to: SNAKES[finalPos]}; }
        else if (LADDERS[finalPos]) { extra = {type:'ladder', to: LADDERS[finalPos]}; }

        if (extra) {
          setTimeout(() => {
            positions[playerIdx] = extra.to;
            drawBoard();
            callback(extra);
          }, 300);
        } else {
          callback(null);
        }
      }, 120);
    }
  }
  step();
}

// ── Dice ──────────────────────────────────────────────────────────────────
function renderDice(val) {
  const svg = document.getElementById('dice-svg');
  const dots = DOT_POSITIONS[val] || [];
  svg.innerHTML = dots.map(([cx,cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="10" fill="#2c2c2c"/>`
  ).join('');
}

function rollDice() {
  if (rolling || phase !== 'playing') return;
  rolling = true;
  document.getElementById('roll-btn').disabled = true;
  const dice = document.getElementById('dice');
  dice.classList.add('disabled');
  dice.classList.add('rolling');
  setTimeout(() => dice.classList.remove('rolling'), 600);

  const finalRoll = Math.ceil(Math.random()*6);
  let ticks = 0;
  const iv = setInterval(() => {
    renderDice(Math.ceil(Math.random()*6));
    ticks++;
    if (ticks >= 10) {
      clearInterval(iv);
      renderDice(finalRoll);
      diceValue = finalRoll;

      // Process move
      let newPos = positions[currentPlayer] + finalRoll;
      let logMsg = `${PLAYERS[currentPlayer].emoji || ''} ${PLAYERS[currentPlayer].name} rolled ${finalRoll}`;

      if (newPos > 100) {
        logMsg += ` — too high, stays at ${positions[currentPlayer]}!`;
        addLog(logMsg);
        rolling = false;
        nextTurn();
        return;
      }

      // Animate
      animateMove(currentPlayer, finalRoll, (extra) => {
        if (positions[currentPlayer] === 100) {
          logMsg += ` → 100! 🏆 WINNER!`;
          addLog(logMsg);
          setWinner(currentPlayer);
        } else {
          if (extra && extra.type === 'snake') {
            logMsg += ` → ${positions[currentPlayer]+0} 🐍 Bitten! Slides to ${extra.to}`;
          } else if (extra && extra.type === 'ladder') {
            logMsg += ` → ${positions[currentPlayer]+0} 🪜 Ladder! Climbs to ${extra.to}`;
          } else {
            logMsg += ` → ${positions[currentPlayer]}`;
          }
          addLog(logMsg);
          rolling = false;
          nextTurn();
        }
      });
    }
  }, 60);
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % numPlayers;
  updateUI();
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('dice').classList.remove('disabled');
}

// ── Winner ────────────────────────────────────────────────────────────────
function setWinner(p) {
  phase = 'won';
  rolling = false;
  document.getElementById('turn-msg').style.color = '#ffd700';
  document.getElementById('turn-msg').textContent = `🏆 ${PLAYERS[p].name} wins!`;
  document.getElementById('roll-btn').textContent = '🔄 Play Again';
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('roll-btn').onclick = () => startGame(numPlayers);
  document.getElementById('roll-btn').style.background = 'linear-gradient(145deg,#ffd700,#ff8c00)';
  document.getElementById('roll-btn').style.boxShadow = '0 4px 15px rgba(255,140,0,0.5)';
  spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c"];
  for (let i=0;i<50;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6+Math.random()*8;
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[i%colors.length]};
      border-radius:${i%3===0?'50%':'2px'};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*2}s;
    `;
    container.appendChild(el);
  }
  setTimeout(() => container.innerHTML='', 5000);
}

// ── UI Updates ────────────────────────────────────────────────────────────
function updateUI() {
  // Players list
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  for (let i=0;i<numPlayers;i++) {
    const pl = PLAYERS[i];
    const isActive = currentPlayer===i && phase==='playing';
    const row = document.createElement('div');
    row.className = 'player-row';
    row.style.background = isActive ? `rgba(${pl.rgb},0.2)` : 'rgba(255,255,255,0.04)';
    row.style.border = isActive ? `1px solid ${pl.color}60` : '1px solid transparent';
    row.innerHTML = `
      <div class="player-token" style="background:radial-gradient(circle at 35% 35%,${pl.light},${pl.color});box-shadow:0 2px 8px ${pl.color}80">${i+1}</div>
      <div style="flex:1">
        <div class="player-name">${pl.name}</div>
        <div class="player-pos">Square ${positions[i] || 'Start'}</div>
      </div>
      ${isActive ? `<div class="player-dot" style="background:${pl.color};box-shadow:0 0 8px ${pl.color}"></div>` : ''}
    `;
    list.appendChild(row);
  }

  // Turn message
  if (phase === 'playing') {
    const tm = document.getElementById('turn-msg');
    tm.style.color = PLAYERS[currentPlayer].light;
    tm.textContent = `${PLAYERS[currentPlayer].name}'s turn — roll the dice!`;
  }

  // Roll button style
  if (phase === 'playing') {
    const btn = document.getElementById('roll-btn');
    btn.textContent = '🎲 Roll!';
    btn.onclick = rollDice;
    btn.style.background = `linear-gradient(145deg,${PLAYERS[currentPlayer].light},${PLAYERS[currentPlayer].color})`;
    btn.style.boxShadow = `0 4px 15px ${PLAYERS[currentPlayer].color}60`;
  }
}

function addLog(msg) {
  moveLog.push(msg);
  const scroll = document.getElementById('log-scroll');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.textContent = msg;
  scroll.appendChild(el);
  scroll.scrollTop = scroll.scrollHeight;
}

// ── Start / Setup ─────────────────────────────────────────────────────────
function startGame(n) {
  numPlayers    = n;
  positions     = [0,0,0,0];
  currentPlayer = 0;
  diceValue     = 1;
  rolling       = false;
  phase         = 'playing';
  moveLog       = [];

  document.getElementById('log-scroll').innerHTML = '';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'block';
  document.getElementById('header').style.display       = 'flex';
  document.getElementById('roll-btn').disabled          = false;

  renderDice(1);
  drawBoard();
  updateUI();
  addLog(`🎲 Game started with ${n} players! Player 1's turn.`);
}

function goSetup() {
  phase = 'setup';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display  = 'none';
  document.getElementById('header').style.display       = 'none';
  document.getElementById('confetti-container').innerHTML = '';
}

// Init dice display
renderDice(1);

// Emoji polyfill placeholders
PLAYERS[0].emoji = '🔴';
PLAYERS[1].emoji = '🔵';
PLAYERS[2].emoji = '🟢';
PLAYERS[3].emoji = '🟡';
</script>
</body>
